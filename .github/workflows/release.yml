# .github/workflows/release.yml
name: Release Control Hub

on:
  push:
    tags:
      - 'v*'
  # 核心改动：允许在 GitHub 网页上手动点击运行并勾选平台
  workflow_dispatch:
    inputs:
      tag_name:
        description: '请输入发布的版本号 (例如 v1.0.3)'
        required: true
        default: 'v1.0.0'
      build_mac_arm:
        description: '是否打包 macOS (M1/M2/M3 ARM版)'
        type: boolean
        default: true
      build_mac_intel:
        description: '是否打包 macOS (Intel 芯片版)'
        type: boolean
        default: true
      build_windows:
        description: '是否打包 Windows'
        type: boolean
        default: true
      build_linux:
        description: '是否打包 Linux (Ubuntu)'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  # ----------------- 1. macOS ARM (M1/M2/M3) 任务 -----------------
  mac_arm:
    if: |
      github.event_name == 'push' || 
      (github.event_name == 'workflow_dispatch' && inputs.build_mac_arm == true)
    uses: ./.github/workflows/build-template.yml
    with:
      platform: 'macos-latest'
      arch: 'aarch64'
      args: '--target aarch64-apple-darwin'
      tag_name: ${{ github.ref_name || inputs.tag_name }}
    secrets: inherit # 继承父工作流的 TAURI_PRIVATE_KEY 等密钥

  # ----------------- 2. macOS Intel 任务 -----------------
  mac_intel:
    if: |
      github.event_name == 'push' || 
      (github.event_name == 'workflow_dispatch' && inputs.build_mac_intel == true)
    uses: ./.github/workflows/build-template.yml
    with:
      platform: 'macos-latest'
      arch: 'x86_64'
      args: '--target x86_64-apple-darwin'
      tag_name: ${{ github.ref_name || inputs.tag_name }}
    secrets: inherit

  # ----------------- 3. Windows 任务 -----------------
  windows:
    if: |
      github.event_name == 'push' || 
      (github.event_name == 'workflow_dispatch' && inputs.build_windows == true)
    uses: ./.github/workflows/build-template.yml
    with:
      platform: 'windows-latest'
      args: ''
      tag_name: ${{ github.ref_name || inputs.tag_name }}
    secrets: inherit

  # ----------------- 4. Linux 任务 -----------------
  linux:
    if: |
      github.event_name == 'push' || 
      (github.event_name == 'workflow_dispatch' && inputs.build_linux == true)
    uses: ./.github/workflows/build-template.yml
    with:
      platform: 'ubuntu-latest'
      args: ''
      tag_name: ${{ github.ref_name || inputs.tag_name }}
    secrets: inherit